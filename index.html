<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/style/style.css">
</head>

<body>
    <h1> DASHBOARD</h1>
    <div class="groupCard" id="userGroup">
        <h2>Usuarios (<span id="userCount"></span>)</h2>
        <p>Haz clic para ver las tarjetas</p>
    </div>

    <div id="userCards" class="collapsed"></div>

    <div class="groupCard" id="taskGroup">
        <h2>Tareas (<span id="taskCount"></span>)</h2>
        <p>Haz clic para ver las tarjetas</p>
    </div>

    <div id="taskCards" class="collapsed"></div>


    <div id="main">
        <aside id="sidebar">
            <h3>Panel lateral</h3>
            <p>Opciones</p>
            <button id="closeSidebar" class="floating-btn">☰</button>
            <button id="toggleTheme" class="theme-btn">
                <span id="themeIcon">🌙</span>
            </button>
        </aside>
        <button id="openSidebar" class="floating-btn">☰</button>
    </div>

</body>
<script type="module" src="./dist/app.js"></script>

</html>
